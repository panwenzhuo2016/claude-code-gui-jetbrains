name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below to help us reproduce and fix the issue.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running the plugin?
      options:
        - JetBrains IDE
        - Browser
    validations:
      required: true

  - type: input
    id: ide-version
    attributes:
      label: IDE / Browser
      description: "e.g. IntelliJ IDEA 2025.1.2, WebStorm 2025.1, Chrome 130"
      placeholder: "IntelliJ IDEA 2025.1.2"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: "0.13.2"
    validations:
      required: true

  - type: input
    id: claude-cli-version
    attributes:
      label: Claude Code CLI Version
      description: "Run `claude --version` in your terminal to check."
      placeholder: "1.0.33"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      value: |
        1.
        2.
        3.

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Paste any relevant logs (backend console, browser DevTools, IDE log)."
      render: text
