name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the motivation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: scope
    attributes:
      label: Affected Area
      description: Which part of the plugin does this relate to?
      multiple: true
      options:
        - Chat UI
        - Session Management
        - Settings
        - Permissions
        - File / Image Attachment
        - Streaming / Rendering
        - Backend (Node.js)
        - JetBrains Integration (Kotlin)
        - Browser Environment
        - Other

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / References
      description: "If applicable, add mockups, screenshots, or links to similar features in other tools (e.g. Cursor)."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature request.
